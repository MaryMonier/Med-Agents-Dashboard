<div class="page-content-inner" style="display:flex; flex-direction:column; height:calc(100vh - 120px);">

  <header class="page-header" style="flex-shrink:0;">
    <div class="page-header__text">
      <h1 class="page-title"><i class="ti ti-robot"></i> AI Medical Assistant</h1>
      <p class="page-subtitle">Ask about symptoms, diagnoses or treatments</p>
    </div>
    <button class="btn-secondary" (click)="clearChat()">
      <i class="ti ti-trash"></i> Clear Chat
    </button>
  </header>

  <!-- Messages -->
  <div class="card" style="flex:1; overflow-y:auto; padding:1.25rem; margin-bottom:1rem; display:flex; flex-direction:column; gap:.75rem;">

    <div *ngFor="let msg of messages"
         style="display:flex; gap:.75rem;"
         [style.flex-direction]="msg.role === 'user' ? 'row-reverse' : 'row'">

      <div style="width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;"
           [style.background]="msg.role === 'user' ? '#185FA5' : '#0D9488'">
        <i [class]="msg.role === 'user' ? 'ti ti-user' : 'ti ti-robot'" style="color:#fff; font-size:.9rem;"></i>
      </div>

      <div style="max-width:70%;">
        <div style="padding:.75rem 1rem; border-radius:12px; font-size:.9rem; line-height:1.6; white-space:pre-wrap;"
             [style.background]="msg.role === 'user' ? '#185FA5' : '#f8fafc'"
             [style.color]="msg.role === 'user' ? '#ffffff' : '#374151'"
             [style.border]="msg.role === 'assistant' ? '1px solid #e2e8f0' : 'none'">
          {{ msg.content }}
        </div>
        <p style="font-size:.7rem; color:#94a3b8; margin-top:.25rem;"
           [style.text-align]="msg.role === 'user' ? 'right' : 'left'">
          {{ formatTime(msg.timestamp) }}
        </p>
      </div>
    </div>

    <!-- Loading -->
    <div *ngIf="isLoading" style="display:flex; gap:.75rem; align-items:center;">
      <div style="width:36px; height:36px; border-radius:50%; background:#0D9488; display:flex; align-items:center; justify-content:center;">
        <i class="ti ti-robot" style="color:#fff; font-size:.9rem;"></i>
      </div>
      <div style="padding:.75rem 1rem; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px;">
        <span class="spinner-xs"></span> Thinking…
      </div>
    </div>

    <div *ngIf="errorMessage" class="error-banner" style="margin:0;">{{ errorMessage }}</div>

    <div #messagesEnd></div>
  </div>

  <!-- Input -->
  <div class="card" style="flex-shrink:0; padding:1rem; display:flex; gap:.75rem; align-items:flex-end;">
    <textarea
      class="form-input"
      rows="2"
      placeholder="Type your medical question… (Enter to send, Shift+Enter for new line)"
      [(ngModel)]="userInput"
      (keydown)="onKeyDown($event)"
      style="flex:1; resize:none;">
    </textarea>
    <button class="btn-primary"
      (click)="sendMessage()"
      [disabled]="isLoading || !userInput.trim()"
      style="padding:.75rem 1.25rem;">
      <i class="ti ti-send"></i>
    </button>
  </div>

</div>
