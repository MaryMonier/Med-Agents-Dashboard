<button class="hamburger" (click)="toggleSidebar()">
  <i class="ti ti-menu"></i>
</button>

@if (isOpen()) {
  <div class="overlay" (click)="toggleSidebar()"></div>
}

<div class="sidebar" [class.open]="isOpen()">
  <div class="sidebar-logo">
    <span class="logo-text">Med Agents</span>
    <span class="logo-sub">your Ai assistant</span>
  </div>

  <div class="nav-section">
    <div class="nav-label">main</div>
    <a class="nav-item" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="isOpen.set(false)">
      <i class="ti ti-layout-dashboard"></i> Dashboard
    </a>
    <a class="nav-item" routerLink="/dashboard/doctors" routerLinkActive="active" (click)="isOpen.set(false)">
      <i class="ti ti-stethoscope"></i> Doctors
    </a>
    <a class="nav-item" routerLink="/dashboard/patients" routerLinkActive="active" (click)="isOpen.set(false)">
      <i class="ti ti-users"></i> Patients
    </a>
    <a class="nav-item" routerLink="/dashboard/consultations" routerLinkActive="active" (click)="isOpen.set(false)">
      <i class="ti ti-stethoscope"></i> Consultations
    </a>
  </div>

  <div class="nav-section">
    <div class="nav-label">medical</div>
    <a class="nav-item" routerLink="/dashboard/prescriptions" routerLinkActive="active" (click)="isOpen.set(false)">
      <i class="ti ti-pill"></i> Prescriptions
    </a>
    <a class="nav-item" routerLink="/dashboard/reports" routerLinkActive="active" (click)="isOpen.set(false)">
      <i class="ti ti-file-text"></i> Reports
    </a>
    <a class="nav-item" routerLink="/dashboard/followups" routerLinkActive="active" (click)="isOpen.set(false)">
      <i class="ti ti-calendar"></i> Follow-ups
    </a>
    <a class="nav-item" routerLink="/dashboard/subscriptions" routerLinkActive="active" (click)="isOpen.set(false)">
  <i class="ti ti-credit-card"></i> Subscriptions
</a>
   <a
  class="nav-item"
  routerLink="/dashboard/payments"
  routerLinkActive="active"
  (click)="isOpen.set(false)"
>
  <i class="ti ti-receipt"></i> Payments
</a>

        <a
  class="nav-item"
  routerLink="/dashboard/contact-messages"
  routerLinkActive="active"
  (click)="isOpen.set(false)"
><i class="ti ti-mail"></i> Contact Messages</a>
  </div>

  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()">
      <i class="ti ti-logout"></i> Logout
    </button>
  </div>
</div>
