<div class="form-page">
  <div class="page-header">
    <button class="btn-back" (click)="goBack()">← Back</button>
    <h2>{{ isEditMode() ? 'Edit Doctor' : 'Add New Doctor' }}</h2>
  </div>

  @if (isLoading()) {
    <div class="loading">Loading...</div>
  }

  @if (errorMessage()) {
    <div class="error">{{ errorMessage() }}</div>
  }

  <div class="form-card">
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text"
        [ngModel]="doctor().name"
        (ngModelChange)="updateField('name', $event)"
        placeholder="Doctor full name" />
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email"
        [ngModel]="doctor().email"
        (ngModelChange)="updateField('email', $event)"
        placeholder="doctor@example.com" />
    </div>

    @if (!isEditMode()) {
      <div class="form-group">
        <label>Password *</label>
        <input type="password"
          [ngModel]="doctor().password"
          (ngModelChange)="updateField('password', $event)"
          [class.input-error]="fieldErrors().password"
          placeholder="Password" />
        @if (fieldErrors().password) {
          <p class="field-error">{{ fieldErrors().password }}</p>
        }
      </div>
    }

    <div class="form-group">
      <label>Specialty</label>
      <input type="text"
        [ngModel]="doctor().specialty"
        (ngModelChange)="updateField('specialty', $event)"
        placeholder="e.g. Internal Medicine" />
    </div>

    <div class="form-group">
      <label>Language</label>
      <select
        [ngModel]="doctor().language"
        (ngModelChange)="updateField('language', $event)">
        <option value="en">English</option>
        <option value="ar">Arabic</option>
      </select>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" (click)="goBack()">Cancel</button>
      <button class="btn-save" (click)="onSubmit()" [disabled]="isLoading()">
        {{ isEditMode() ? 'Save Changes' : 'Add Doctor' }}
      </button>
    </div>
  </div>
</div>
