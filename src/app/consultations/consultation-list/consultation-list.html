<div class="consultations-container">

  <!-- Header -->
  <div class="header">
    <h2>Consultations</h2>
    <a mat-raised-button color="primary" routerLink="add">
      <mat-icon>add</mat-icon> New Consultation
    </a>
  </div>

  <!-- Search -->
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search</mat-label>
    <input matInput [(ngModel)]="searchQuery"
           (ngModelChange)="onSearch()"
           placeholder="Search consultations..."/>
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <!-- Table -->
  <table mat-table [dataSource]="filteredConsultations" class="mat-elevation-z2">

    <ng-container matColumnDef="patientId">
      <th mat-header-cell *matHeaderCellDef>Patient</th>
      <td mat-cell *matCellDef="let c">{{ c.patientId }}</td>
    </ng-container>

    <ng-container matColumnDef="symptoms">
      <th mat-header-cell *matHeaderCellDef>Symptoms</th>
      <td mat-cell *matCellDef="let c">{{ c.symptoms.join(', ') }}</td>
    </ng-container>

    <ng-container matColumnDef="urgencyLevel">
      <th mat-header-cell *matHeaderCellDef>Urgency</th>
      <td mat-cell *matCellDef="let c">
        <mat-chip [color]="getUrgencyColor(c.urgencyLevel)" highlighted>
          {{ c.urgencyLevel }}
        </mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="suggestedSpecialist">
      <th mat-header-cell *matHeaderCellDef>Specialist</th>
      <td mat-cell *matCellDef="let c">{{ c.suggestedSpecialist }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let c">{{ c.status }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let c">
        <a mat-icon-button [routerLink]="['edit', c._id]">
          <mat-icon>edit</mat-icon>
        </a>
        <button mat-icon-button color="warn" (click)="deleteConsultation(c._id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <!-- Pagination -->
  <mat-paginator
    [length]="totalItems"
    [pageSize]="pageSize"
    [pageSizeOptions]="[5, 10, 25]"
    (page)="onPageChange($event)">
  </mat-paginator>

</div>
