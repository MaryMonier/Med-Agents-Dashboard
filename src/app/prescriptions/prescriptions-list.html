<div class="page">
  <div class="header">
    <div>
      <h2>Prescriptions</h2>
      <p>Search prescriptions by patient ID</p>
    </div>

    <a routerLink="/prescriptions/new" class="add-btn">+ Add Prescription</a>
  </div>

  <div class="search-card">
    <label>Patient ID</label>
    <div class="search-row">
      <input
        type="text"
        [ngModel]="patientId()"
        (ngModelChange)="patientId.set($event)"
        placeholder="Enter patient ID"
      />

      <button (click)="searchByPatient()" [disabled]="isLoading()">
        {{ isLoading() ? 'Loading...' : 'Search' }}
      </button>
    </div>
  </div>

  <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>

  <div class="table-card" *ngIf="prescriptions().length > 0">
    <table>
      <thead>
        <tr>
          <th>Medication</th>
          <th>Dose</th>
          <th>Frequency</th>
          <th>Duration</th>
          <th>Language</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let prescription of prescriptions()">
          <td>
            <div *ngFor="let med of prescription.medications">
              {{ med.name }}
            </div>
          </td>

          <td>
            <div *ngFor="let med of prescription.medications">
              {{ med.dose }}
            </div>
          </td>

          <td>
            <div *ngFor="let med of prescription.medications">
              {{ med.frequency }}
            </div>
          </td>

          <td>
            <div *ngFor="let med of prescription.medications">
              {{ med.duration }}
            </div>
          </td>

          <td>{{ prescription.language }}</td>

          <td>
            <button class="delete-btn" (click)="deletePrescription(prescription._id)">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <p class="empty" *ngIf="!isLoading() && prescriptions().length === 0">
    No prescriptions to display. Search by patient ID.
  </p>
</div>
