<div class="admin-container">
  <div class="admin-header">
    <h2>Doctors Management</h2>
  </div>

  @if (isLoading()) {
    <p>Loading...</p>
  } @else {
    <table class="doctors-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Specialty</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (doctor of doctors(); track doctor._id) {
          <tr>
            <td>{{ doctor.name }}</td>
            <td>{{ doctor.email }}</td>
            <td>{{ doctor.specialty || 'N/A' }}</td>
            <td>
              <button (click)="deleteDoctor(doctor._id)" class="delete-btn">Delete</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
